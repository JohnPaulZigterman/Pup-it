services:
  - type: web
    name: pup-it
    runtime: node
    buildCommand: npm ci && npm run render:build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pup-it-db
          property: connectionString
      - key: PG_POOL_MAX
        value: "8"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "0"
      - key: CLIENT_ORIGIN
        value: ""
      - key: PUBLIC_BASE_URL
        value: ""
      - key: VITE_SERVER_URL
        value: ""
      - key: VITE_DOINKTV_SUBMISSION_URL
        value: ""

databases:
  - name: pup-it-db
    databaseName: pup_it
    user: pup_it
